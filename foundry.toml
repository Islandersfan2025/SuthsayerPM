[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Solidity version
solc_version = "0.8.26"

# Optimizer (required for via_ir)
optimizer = true
optimizer_runs = 200

# Fixes "stack too deep"
via_ir = true

# Required for OpenZeppelin (mcopy support)
evm_version = "cancun"

# Allow Chainlink Functions (if used later)
ffi = true

# Remappings
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "@chainlink/=lib/chainlink-brownie-contracts/"
]

# RPC endpoints
[rpc_endpoints]
local = "http://127.0.0.1:8545"
sonic_testnet = "https://rpc.blaze.soniclabs.com"

# Etherscan-style verification (optional)
[etherscan]
sonic_testnet = { key = "${SONICSCAN_API_KEY}", url = "https://api-testnet.sonicscan.org/api" }

# Formatting (optional but helpful)
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true